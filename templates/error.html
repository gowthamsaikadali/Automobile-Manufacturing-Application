{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-5">
                <div class="display-3 fw-bold text-primary mb-3">{{ code }}</div>
                <h3 class="mb-2">{{ title }}</h3>
                <p class="text-muted mb-4">{{ message }}</p>
                <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('main.login') }}" class="btn btn-primary">Go Back</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
